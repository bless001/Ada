name: coding-agent-infra

services:
  # -------------------------------------------------------------------------
  # PostgreSQL
  # Main relational DB for the coding agent + external DB for OpenProject.
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: ca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_APP_DB}
      POSTGRES_OPENPROJECT_DB: ${POSTGRES_OPENPROJECT_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_APP_DB}"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - ca_net

  # -------------------------------------------------------------------------
  # Redis
  # Queue for webhook-triggered agent jobs.
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ca-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - ca_net

  # -------------------------------------------------------------------------
  # OpenProject
  # Human-agent planning and approval interface.
  # -------------------------------------------------------------------------
  openproject:
    image: openproject/openproject:${OPENPROJECT_VERSION}
    container_name: ca-openproject
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SECRET_KEY_BASE: ${OPENPROJECT_SECRET_KEY_BASE}
      OPENPROJECT_SSRF__PROTECTION__IP__ALLOWLIST: ${OPENPROJECT_SSRF_PROTECTION_IP_ALLOWLIST}
      OPENPROJECT_SECRET_KEY_BASE: ${OPENPROJECT_SECRET_KEY_BASE}
      OPENPROJECT_HOST__NAME: ${OPENPROJECT_HOST_NAME}
      OPENPROJECT_HTTPS: "false"
      OPENPROJECT_DEFAULT__LANGUAGE: "en"
      OPENPROJECT_REST__API__ENABLED: "true"
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_OPENPROJECT_DB}"
    ports:
      - "${OPENPROJECT_PORT}:80"
    volumes:
      - openproject_assets:/var/openproject/assets
    networks:
      - ca_net
      
  agent-secrets-init:
    image: alpine:3.20
    container_name: ca-agent-secrets-init
    restart: "no"
    command:
      - /bin/sh
      - -lc
      - |
        mkdir -p /agent-secrets
        chmod 0777 /agent-secrets
        echo "Prepared /agent-secrets volume."
    volumes:
      - openproject_agent_secrets:/agent-secrets
    networks:
      - ca_net
  # -------------------------------------------------------------------------
  # Zero-manual OpenProject provisioner
  # Creates bot user, admin permission, API token, webhook, and starter workflow.
  # -------------------------------------------------------------------------
  openproject-provision:
    image: openproject/openproject:${OPENPROJECT_VERSION}
    container_name: ca-openproject-provision
    restart: "no"
    depends_on:
      openproject:
        condition: service_started
      agent-webhook:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      SECRET_KEY_BASE: ${OPENPROJECT_SECRET_KEY_BASE}
      OPENPROJECT_SECRET_KEY_BASE: ${OPENPROJECT_SECRET_KEY_BASE}
      RAILS_ENV: production
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_OPENPROJECT_DB}"

      OP_AGENT_LOGIN: ${OP_AGENT_LOGIN}
      OP_AGENT_EMAIL: ${OP_AGENT_EMAIL}
      OP_AGENT_FIRSTNAME: ${OP_AGENT_FIRSTNAME}
      OP_AGENT_LASTNAME: ${OP_AGENT_LASTNAME}
      OP_AGENT_ADMIN: ${OP_AGENT_ADMIN}
      OP_AGENT_TOKEN_FILE: /agent-secrets/openproject_api_token

      OP_AGENT_WEBHOOK_NAME: ${OP_AGENT_WEBHOOK_NAME}
      OP_AGENT_WEBHOOK_URL: ${OP_AGENT_WEBHOOK_URL}
      OP_AGENT_WEBHOOK_DESCRIPTION: ${OP_AGENT_WEBHOOK_DESCRIPTION}
      OP_AGENT_WEBHOOK_SECRET: ${WEBHOOK_SIGNATURE_SECRET}
      OP_AGENT_WEBHOOK_EVENTS: ${OP_AGENT_WEBHOOK_EVENTS}
      OP_AGENT_WEBHOOK_ALL_PROJECTS: ${OP_AGENT_WEBHOOK_ALL_PROJECTS}

      OP_CREATE_STARTER_PROJECT: ${OP_CREATE_STARTER_PROJECT}
      OP_STARTER_PROJECT_IDENTIFIER: ${OP_STARTER_PROJECT_IDENTIFIER}
      OP_STARTER_PROJECT_NAME: ${OP_STARTER_PROJECT_NAME}
    volumes:
      - ./openproject/provision:/provision:ro
      - openproject_agent_secrets:/agent-secrets
    command:
      - /bin/bash
      - -lc
      - |
        echo "Waiting until OpenProject Rails environment is ready..."
        attempts=0
        until bundle exec rails runner "puts 'rails-ready'" >/tmp/openproject-rails-ready.log 2>&1; do
          attempts=$$((attempts + 1))
          echo "OpenProject Rails is not ready yet. Attempt: $$attempts"
          cat /tmp/openproject-rails-ready.log || true

          if [ "$$attempts" -ge 60 ]; then
            echo "ERROR: OpenProject Rails did not become ready after 5 minutes."
            echo "Check SECRET_KEY_BASE, DATABASE_URL, and openproject logs:"
            echo "  docker compose logs openproject"
            exit 1
          fi

          sleep 5
        done

        echo "Running zero-manual OpenProject provisioning..."
        bundle exec rails runner /provision/ensure_agent_bot_token_webhook.rb
    networks:
      - ca_net

  # -------------------------------------------------------------------------
  # Agent webhook receiver
  # Receives OpenProject webhooks, stores event in PostgreSQL, queues job in Redis.
  # -------------------------------------------------------------------------
  agent-webhook:
    build:
      context: ./agent_trigger
    container_name: ca-agent-webhook
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8090"]
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_APP_DB}"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_QUEUE: ${REDIS_QUEUE}
      WEBHOOK_SIGNATURE_SECRET: ${WEBHOOK_SIGNATURE_SECRET}
      WEBHOOK_REQUIRE_SIGNATURE: ${WEBHOOK_REQUIRE_SIGNATURE}
      WEBHOOK_SIGNATURE_HEADER: ${WEBHOOK_SIGNATURE_HEADER}
    ports:
      - "${AGENT_WEBHOOK_PORT}:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ca_net

  # -------------------------------------------------------------------------
  # Agent worker
  # Fetches full OpenProject context and triggers coding-agent placeholder.
  # -------------------------------------------------------------------------
  agent-worker:
    build:
      context: ./agent_trigger
    container_name: ca-agent-worker
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_APP_DB}"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_QUEUE: ${REDIS_QUEUE}
      OPENPROJECT_BASE_URL: http://openproject
      OPENPROJECT_API_TOKEN_FILE: /agent-secrets/openproject_api_token
      AGENT_TRIGGER_STATUS_NAMES: ${AGENT_TRIGGER_STATUS_NAMES}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      WEAVIATE_URL: http://weaviate:8080
      OPENPROJECT_API_HOST_HEADER: ${OPENPROJECT_API_HOST_HEADER}
    volumes:
      - openproject_agent_secrets:/agent-secrets:ro
      - ./workspace:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      openproject-provision:
        condition: service_completed_successfully
    networks:
      - ca_net

  # -------------------------------------------------------------------------
  # Neo4j
  # Code dependency graph + project planning graph + memory graph.
  # -------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: ca-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_USER}/${NEO4J_PASSWORD}"
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE_SIZE}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "${NEO4J_HTTP_PORT}:7474"
      - "${NEO4J_BOLT_PORT}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER} -p ${NEO4J_PASSWORD} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
    networks:
      - ca_net

  # -------------------------------------------------------------------------
  # Weaviate
  # Vector database. Backend/agent should generate embeddings explicitly.
  # -------------------------------------------------------------------------
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:${WEAVIATE_VERSION}
    container_name: ca-weaviate
    restart: unless-stopped
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      AUTHORIZATION_ADMINLIST_ENABLED: "false"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
      DISABLE_TELEMETRY: "true"
    ports:
      - "${WEAVIATE_HTTP_PORT}:8080"
      - "${WEAVIATE_GRPC_PORT}:50051"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - ca_net

  # -------------------------------------------------------------------------
  # llama.cpp server
  # Optional profile. Put a GGUF model in ./models and run with --profile llm.
  # -------------------------------------------------------------------------
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: ca-llama-cpp
    restart: unless-stopped
    profiles:
      - llm
    command:
      - "-m"
      - "/models/${LLAMA_MODEL_FILE}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "-c"
      - "${LLAMA_CONTEXT_SIZE}"
      - "-ngl"
      - "${LLAMA_GPU_LAYERS}"
    ports:
      - "${LLAMA_CPP_PORT}:8080"
    volumes:
      - ./models:/models:ro
    networks:
      - ca_net

volumes:
  postgres_data:
  redis_data:
  openproject_assets:
  openproject_agent_secrets:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  weaviate_data:

networks:
  ca_net:
    driver: bridge
    ipam:
      config:
        - subnet: ${CODING_AGENT_DOCKER_SUBNET}
